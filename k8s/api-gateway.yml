apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: chauhan0799/linkedin-app-api-gateway
          resources:
            limits:
              memory: "768Mi"  # Increased: Spring Cloud Gateway needs more RAM
              cpu: "1000m"     # Increased: Low CPU (200m) causes very slow startup
            requests:
              memory: "256Mi"
              cpu: "500m"
          ports:
            - containerPort: 9000
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            # Force-disable Eureka/Config if they are causing the "silent hang"
            - name: EUREKA_CLIENT_ENABLED
              value: "false"
            - name: SPRING_CLOUD_CONFIG_ENABLED
              value: "false"

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 45  # Reduced from 300: 5 mins is too long for local dev
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 10     # Gives the app 100 seconds total to wake up
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  type: LoadBalancer # Changed to LoadBalancer for easier access on Docker Desktop
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 9000